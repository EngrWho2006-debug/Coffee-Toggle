<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Filling Toggle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="toggle-container">
        <input type="checkbox" id="coffee-toggle" class="toggle-input">
        <label for="coffee-toggle" class="toggle-label">
            <span class="toggle-button">
                <span class="bean-line"></span>
                <span class="cup-handle"></span>
                <span class="steam-container">
                    <span class="steam s1"></span>
                    <span class="steam s2"></span>
                    <span class="steam s3"></span>
                </span>
            </span>
        </label>
    </div>

    <script src="script.js"></script>
</body>
</html>
